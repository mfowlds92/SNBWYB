<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>NSYBWB</title>
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=Poppins:wght@400;600;700&display=swap" rel="stylesheet">
  <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.2/css/all.min.css" referrerpolicy="no-referrer" />
  <link rel="stylesheet" href="style.css?v=3" />
</head>
<body>
<div id="app"></div>
  <div class="app">
    <header>
      <h1>NSYBWB</h1>
      <p>Nomination Super Yaniv Basketball Whist Brag</p>
    </header>

    <main class="game-layout">
  <div class="game-main">
    <div id="playerStatusBoxes" class="player-status-boxes"></div>

    <section class="panel" data-tab="waiting">
      <h2>Lobby</h2>
      <div class="name-entry">
        <input id="nameInput" type="text" placeholder="Your name" />
        <button id="saveNameBtn">Save Name</button>
      </div>
      <button id="startGameBtn">Start Test Game</button>
      <div id="waitingContent"></div>
    </section>

    <section class="panel" data-tab="splitter">
      <div class="panel-header-with-tooltip">
        <h2 style="display:none;">Hand Splitter</h2>
        <div class="tooltip-icon" title="Split your hand into Brag, Yaniv, and Whist piles">?</div>
      </div>
      <p id="splitInstructions" style="display:none;"></p>
      <div id="splitter"></div>
    </section>

    <section class="panel" data-tab="brag">
      <div class="panel-header-with-tooltip">
        <h2 style="display:none;">Brag</h2>
        <div class="tooltip-icon" title="Players compete to have the best 3-card hand">?</div>
      </div>
      <p id="bragStatus">Brag not started yet.</p>
      <div id="bragControls"></div>
      <div id="bragTable"></div>
    </section>

    <section class="panel" data-tab="brag-results">
      <div class="panel-header-with-tooltip">
        <div class="sort-toggle sort-toggle-suit sort-toggle-disabled" aria-disabled="true">
          <div class="sort-toggle-thumb"></div>
          <button type="button" class="sort-toggle-option active" disabled>Suit</button>
          <button type="button" class="sort-toggle-option" disabled>Number</button>
        </div>
        <h2 style="display:none;">Brag Results</h2>
        <div class="tooltip-icon" title="Results from the Brag round">?</div>
      </div>
      <div id="bragResultsContent"></div>
      <div style="display: flex; justify-content: flex-end; margin-top: 16px;">
        <button id="continueToYanivFromBragBtn" onclick="window.continueToYanivHandler()">Continue to Yaniv</button>
      </div>
    </section>

    <section class="panel" data-tab="yaniv">
      <div class="panel-header-with-tooltip">
        <h2 style="display:none;">Yaniv</h2>
        <div class="tooltip-icon" title="Draw and discard cards to get your hand total to 5 or less">?</div>
      </div>
      <div id="yanivControls"></div>
      <div id="yanivTable"></div>
    </section>

    <section class="panel" data-tab="whist">
      <div class="panel-header-with-tooltip">
        <h2 style="display:none;">Whist</h2>
        <div class="tooltip-icon" title="Nominate tricks and win exactly that many">?</div>
      </div>
      <div id="whistTable"></div>
    </section>

    <section class="panel" data-tab="scoreboard">
      <div class="panel-header-row">
        <h2>Full Scoreboard</h2>
        <button id="returnToGameBtn">Back to Game</button>
      </div>
      <div id="scoreboard"></div>
    </section>
  </div>

  <aside class="game-sidebar">
    <div class="panel sidebar-panel">
      <div class="sidebar-tab-buttons">
        <button id="sidebarTabDetailsBtn" class="active" title="Details" aria-label="Details"><i class="fa-solid fa-circle-info"></i></button>
        <button id="sidebarTabLeaderboardBtn" title="Leaderboard" aria-label="Leaderboard"><i class="fa-solid fa-trophy"></i></button>
        <button id="sidebarTabChatBtn" title="Chat" aria-label="Chat"><i class="fa-solid fa-comments"></i></button>
      </div>

      <section id="sidebarDetailsTab" class="sidebar-tab-panel active">
        <section class="status-bar-panel" id="statusPanel">
          <div class="button-row compact-status-buttons">
            <button id="showScoreboardBtn">Show Scoreboard</button>
            <button id="jumpRoundBtn">Jump Round</button>
            <button id="endGameBtn">End Game</button>
          </div>
          <div class="status-info">
            <div id="status">Game not started yet.</div>
          </div>
        </section>
      </section>

      <section id="sidebarLeaderboardTab" class="sidebar-tab-panel">
        <div id="leaderboard"></div>
        <div id="players"></div>
      </section>

      <section id="sidebarChatTab" class="sidebar-tab-panel">
        <div id="chatLog" class="chat-log"></div>
        <div class="chat-composer">
          <textarea id="chatInput" rows="2" placeholder="Type a message..."></textarea>
          <div class="chat-send-row">
            <button id="sendChatBtn">Send</button>
          </div>
        </div>
      </section>
    </div>
  </aside>
    </main>
    <div id="debugMetricsFooter" class="debug-metrics-footer"></div>
  </div>
  <script src="/socket.io/socket.io.js?v=3"></script>
  <script type="module" src="script.js?v=3"></script>
</body>
</html>
